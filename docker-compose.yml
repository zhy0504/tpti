services:
  h5:
    build:
      context: .
    image: ghcr.io/zhy0504/tpti-h5:latest
    container_name: tpti-h5
    ports:
      - "6666:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
    image: ghcr.io/zhy0504/tpti-h5-api:latest
    container_name: tpti-h5-api
    environment:
      PORT: 3001
      TZ: Asia/Shanghai
      PARTICIPATION_TIME_ZONE: Asia/Shanghai
      PARTICIPATION_DB_PATH: /app/data/participation.sqlite
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - participation_data:/app/data

volumes:
  participation_data:
